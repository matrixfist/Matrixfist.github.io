<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#F0EDE8;font-family:"Barlow Condensed",sans-serif;color:#0A0A0A;min-height:100vh;}
.trade-card {
  width: 100%;
  max-width: 420px;
  background: #F8F6F2;
  border-radius: 18px;
  border: 5px solid #0A0A0A;
  overflow: hidden;
  font-family: "Barlow Condensed", sans-serif;
  box-shadow: 6px 8px 0 #0A0A0A, 0 20px 60px rgba(0,0,0,0.25);
  position: relative;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.012) 2px, rgba(0,0,0,0.012) 3px
  );
}
/* ── PHOTO SECTION ── */
.tc-photo-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4/5;
  overflow: hidden;
  border-bottom: 4px solid #0A0A0A;
  background: #1a1a1a;
}
.tc-photo {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  display: block;
}
.tc-photo-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
  background: repeating-linear-gradient(
    -45deg, #111 0px, #111 8px, #1a1a1a 8px, #1a1a1a 16px
  );
}
.tc-photo-fade {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    transparent 40%,
    rgba(248,246,242,0.6) 75%,
    rgba(248,246,242,1) 100%
  );
}
.tc-float-flag {
  position: absolute; top: 14px; left: 16px;
  font-size: 32px; line-height: 1;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
}
.tc-float-logo {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  white-space: nowrap;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
}
.tc-float-rank {
  position: absolute; top: 12px; right: 14px;
  text-align: center;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
}
.tc-float-rank-emoji { font-size: 26px; display: block; }
.tc-float-rank-name {
  font-family: "JetBrains Mono", monospace;
  font-size: 8px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.16em; text-transform: uppercase;
  display: block; margin-top: 2px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
.tc-hero {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px 16px 10px;
}
.tc-name {
  font-family: "Bebas Neue", sans-serif;
  font-size: clamp(28px, 7vw, 40px);
  letter-spacing: 0.04em; color: #0A0A0A;
  line-height: 0.95; margin-bottom: 3px;
}
.tc-handle {
  font-family: "JetBrains Mono", monospace;
  font-size: 13px; font-weight: 700;
  color: #0A0A0A; letter-spacing: 0.06em;
  margin-bottom: 3px;
}
.tc-location { font-size: 12px; color: #555; letter-spacing: 0.04em; }
/* ── BODY ── */
.tc-body { padding: 14px 16px 16px; }
.tc-stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 8px; margin-bottom: 12px;
}
.tc-stat {
  background: #fff;
  border: 3px solid #0A0A0A;
  border-radius: 8px;
  padding: 10px 6px; text-align: center;
}
.tc-stat-num {
  font-family: "Bebas Neue", sans-serif;
  font-size: 32px; color: #0A0A0A; line-height: 1;
}
.tc-stat-label {
  font-family: "JetBrains Mono", monospace;
  font-size: 8px; color: #888;
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-top: 2px;
}
.tc-progress { margin-bottom: 12px; }
.tc-progress-meta {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 5px;
}
.tc-progress-meta .lbl {
  font-family: "JetBrains Mono", monospace;
  font-size: 8px; color: #aaa; letter-spacing: 0.14em; text-transform: uppercase;
}
.tc-progress-meta .val { font-size: 11px; font-weight: 700; color: #555; }
.tc-progress-track {
  height: 6px; background: #e0e0e0;
  border: 2px solid #0A0A0A; border-radius: 3px; overflow: hidden;
}
.tc-progress-fill { height: 100%; }
.tc-details {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 12px;
}
.tc-detail {
  background: #fff;
  border: 2px solid #0A0A0A;
  border-radius: 8px; padding: 9px 11px;
}
.tc-detail-label {
  font-family: "JetBrains Mono", monospace;
  font-size: 8px; color: #aaa;
  letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px;
}
.tc-detail-value { font-size: 14px; font-weight: 800; color: #0A0A0A; line-height: 1.25; }
.tc-detail-value.empty { color: #ccc; font-weight: 500; font-style: italic; }
.tc-sig {
  background: #0A0A0A;
  border: 2px solid #0A0A0A;
  border-radius: 8px; padding: 11px 12px; margin-bottom: 12px;
}
.tc-sig-label {
  font-family: "JetBrains Mono", monospace;
  font-size: 8px; color: #555;
  letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 5px;
}
.tc-sig-value { font-size: 16px; font-weight: 800; color: #FFC800; }
.tc-sig-value.empty { color: #333; }
.tc-actions {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 12px;
}
.tc-btn {
  display: block; padding: 12px 8px;
  background: #0A0A0A; color: #fff;
  border: 2px solid #0A0A0A;
  border-radius: 8px;
  font-family: "Barlow Condensed", sans-serif;
  font-size: 14px; font-weight: 900;
  letter-spacing: 0.08em; text-transform: uppercase;
  text-align: center; text-decoration: none;
  transition: background 0.12s, color 0.12s;
}
.tc-btn:hover { background: #fff; color: #0A0A0A; }
.tc-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 10px; border-top: 1px solid #e0e0e0;
}
.tc-foot-left { font-size: 10px; color: #bbb; }
.tc-foot-right { font-family: "JetBrains Mono", monospace; font-size: 9px; color: #ccc; }
.page{max-width:500px;margin:0 auto;padding:90px 20px 0;}
.state-screen{padding:80px 32px;text-align:center;}
.state-icon{font-size:64px;margin-bottom:16px;}
.state-title{font-family:"Bebas Neue",sans-serif;font-size:40px;letter-spacing:.04em;color:#0A0A0A;margin-bottom:8px;}
.state-sub{font-size:16px;color:#888;}
.below-card{margin-top:20px;}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.share-btn{padding:13px;border-radius:8px;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border:2px solid #0A0A0A;cursor:pointer;transition:all .12s;}
.share-btn.dark{background:#0A0A0A;color:#fff;}
.share-btn.dark:hover{background:#fff;color:#0A0A0A;}
.share-btn.light{background:#fff;color:#0A0A0A;}
.share-btn.light:hover{background:#0A0A0A;color:#fff;}
.create-cta{background:#fff;border:2px solid #0A0A0A;border-radius:10px;padding:20px;text-align:center;margin-bottom:32px;}
.create-cta p{font-size:14px;color:#888;margin-bottom:10px;}
.create-cta a{display:inline-block;background:#0A0A0A;color:#fff;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:10px 24px;border-radius:6px;text-decoration:none;}
</style>
</head>

function renderTradeCard(p, photoSrc, arena, rival, cardUrl) {
  const rank = p.rank_id || 1;
  const rd = RANK_DATA[rank] || RANK_DATA[1];
  const flag = COUNTRY_FLAGS[p.country] || '🌍';
  const wins = p.wins || 0;
  const losses = p.losses || 0;
  const streak = p.best_streak || p.current_streak || 0;
  const ageGroup = p.age ? (p.age <= 17 ? '10–17' : '18+') : '—';

    const prev = rank === 1 ? 0 : (RANK_DATA[rank-1]?.next_wins || 0);
    pct = Math.min(100, Math.round(((wins - prev) / (rd.next_wins - prev)) * 100));
    const rem = rd.next_wins - wins;
    distLabel = rem > 0 ? `${rem} to ${RANK_DATA[rank+1]?.name || 'next'}` : '🎉 Ready to rank up!';
  }
  const photoHtml = photoSrc
    ? `<img class="tc-photo" src="${photoSrc}" alt="${p.display_name || p.handle}">`
    : `<div class="tc-photo-placeholder">👤</div>`;

      <div class="tc-float-logo"><img src="https://aneqybvksubgxbflwofb.supabase.co/storage/v1/object/public/assets/MF-BLACKLETTER.png" alt="Matrix Fist" style="height:28px;width:auto;filter:invert(1) brightness(2);opacity:0.7;"></div>

        <span class="tc-float-rank-name">${rd.name}</span>
      </div>
      <div class="tc-hero">
        <div class="tc-name">${p.display_name || p.handle}</div>

      </div>
      <div class="tc-progress">
        <div class="tc-progress-meta">

          <span class="val">${distLabel}</span>
        </div>
        <div class="tc-progress-track">
          <div class="tc-progress-fill" style="width:${pct}%;background:${rd.color};"></div>
        </div>
      </div>
      <div class="tc-details">

      <div class="share-row">
        <button class="share-btn dark" onclick="doShare('${cardUrl}','${p.display_name||p.handle}','${rd.emoji} ${rd.name} · ${wins} Wins')">&#128279; Share Card</button>
        <button class="share-btn light" onclick="copyLink('${cardUrl}')">&#128203; Copy Link</button>
      </div>
      <div class="create-cta">
        <p>Create your own Matrix Fist trade card</p>
        <a href="/tradecard">Make My Card &rarr;</a>
      </div>
    </div>
  `;
}
function doShare(url, name, desc) {
  if (navigator.share) navigator.share({title:`${name} — Matrix Fist Trade Card`,text:`${desc}`,url});
  else copyLink(url);
}
function copyLink(url) {
  navigator.clipboard.writeText(url).then(()=>{
    const btn = event.target;
    btn.textContent='✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy Link',2000);
  }).catch(()=>alert(url));
}
load();
</script>
</body>
</html>
