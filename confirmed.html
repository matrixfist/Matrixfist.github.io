<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="5;url=https://matrixfist.com">
<style>
  body { margin:0; padding:0; background:#07101E; font-family:'Helvetica Neue',Arial,sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { max-width:480px; width:90%; background:#0D1927; border:1px solid #18293D;
          border-radius:16px; padding:48px 40px; text-align:center; }
  .logo { font-size:28px; font-weight:900; color:#F0F8FF; letter-spacing:5px; margin:0 0 8px; }
  .logo-i { color:#FFC800; }
  .check { font-size:56px; margin:24px 0; }
  h1 { font-size:26px; font-weight:900; color:#F0F8FF; margin:0 0 12px; }
  p { font-size:15px; color:#8AAEC8; line-height:1.7; margin:0 0 28px; }
  .btn { display:inline-block; background:#00B4FF; color:#07101E; font-size:16px;
         font-weight:800; padding:14px 32px; border-radius:8px; text-decoration:none;
         letter-spacing:1px; }
  .redirect { font-size:12px; color:#4A6A8A; margin-top:20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">MATR<span class="logo-i">I</span>X FIST</div>
  <div class="check">✅</div>
  <h1>Email Confirmed.</h1>
  <p>Your account is active. Open the Matrix Fist app, set your handle, and begin your record.<br><br>The search for the Eighth Grand Master is open.</p>
  <a href="https://matrixfist.com" class="btn">Go to matrixfist.com</a>
  <p class="redirect">Redirecting automatically in 5 seconds...</p>
</div>
</body>
</html>
