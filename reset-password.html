<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Fist — Reset Password</title>
<style>
:root{--black:#0a0a0a;--gold:#ffc800;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:#fff;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:420px;}
.logo{font-size:11px;letter-spacing:6px;color:#444;text-transform:uppercase;margin-bottom:40px;}
.logo span{color:var(--gold);}
h1{font-size:32px;font-weight:900;line-height:1;margin-bottom:8px;}
.sub{font-size:14px;color:#666;margin-bottom:32px;line-height:1.5;}
.field{margin-bottom:16px;}
label{display:block;font-size:11px;letter-spacing:2px;color:#666;text-transform:uppercase;margin-bottom:6px;}
input{width:100%;background:#111;border:1px solid #222;color:#fff;padding:14px 16px;font-size:16px;border-radius:4px;outline:none;}
input:focus{border-color:#444;}
.btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:16px;font-size:14px;font-weight:900;letter-spacing:2px;text-transform:uppercase;border-radius:4px;cursor:pointer;margin-top:8px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.msg{margin-top:20px;padding:14px 16px;border-radius:4px;font-size:13px;line-height:1.5;display:none;}
.msg.success{background:rgba(34,170,68,.12);border:1px solid rgba(34,170,68,.3);color:#22aa44;}
.msg.error{background:rgba(204,34,0,.12);border:1px solid rgba(204,34,0,.3);color:#ff6644;}
.strength{height:3px;background:#222;margin-top:6px;border-radius:2px;overflow:hidden;}
.strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s;}
.footer{margin-top:28px;padding-top:20px;border-top:1px solid #1a1a1a;text-align:center;}
.footer a{color:#444;font-size:12px;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">MATRIX <span>FIST</span></div>
  <h1>Set New Password</h1>
  <p class="sub">Enter your new password below. Once saved, log in to the app immediately.</p>
  <div class="field">
    <label>New Password</label>
    <input type="password" id="pw1" placeholder="Minimum 8 characters" oninput="checkStrength()">
    <div class="strength"><div class="strength-bar" id="sbar"></div></div>
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="pw2" placeholder="Repeat password">
  </div>
  <button class="btn" id="btn" onclick="resetPassword()">Set Password</button>
  <div class="msg" id="msg"></div>
  <div class="footer"><a href="https://matrixfist.com">Back to Matrix Fist</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://aneqybvksubgxbflwofb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuZXF5YnZrc3ViZ3hiZmx3b2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjUwNzgsImV4cCI6MjA5MjIwMTA3OH0.0o89k7HN9hr4e-7NTKQ00eSLF-sVG71r1uQtmDuZe88'
);

window.addEventListener('load', async () => {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const at = params.get('access_token');
  const rt = params.get('refresh_token');
  const type = params.get('type');
  if (!at || type !== 'recovery') {
    show('error','This link is invalid or has expired. Please request a new password reset from the app.');
    document.getElementById('btn').disabled = true;
    return;
  }
  const {error} = await sb.auth.setSession({access_token:at, refresh_token:rt||''});
  if (error) {
    show('error','This link has expired. Please request a new password reset from the app.');
    document.getElementById('btn').disabled = true;
  }
});

function checkStrength() {
  const pw = document.getElementById('pw1').value;
  const bar = document.getElementById('sbar');
  let s = 0;
  if (pw.length>=8) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const c=['#cc2200','#ff8800','#ffc800','#22aa44'];
  const w=['25%','50%','75%','100%'];
  bar.style.width = pw.length ? (w[s-1]||'10%') : '0';
  bar.style.background = pw.length ? (c[s-1]||'#cc2200') : 'transparent';
}

async function resetPassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const btn = document.getElementById('btn');
  if (pw1.length < 8) { show('error','Password must be at least 8 characters.'); return; }
  if (pw1 !== pw2) { show('error','Passwords do not match.'); return; }
  btn.disabled = true; btn.textContent = 'Saving...';
  const {error} = await sb.auth.updateUser({password: pw1});
  if (error) {
    show('error', error.message || 'Something went wrong. Please try again.');
    btn.disabled = false; btn.textContent = 'Set Password';
  } else {
    show('success','Password updated. You can now log in to the Matrix Fist app with your new password.');
    btn.textContent = 'Done';
  }
}

function show(type, text) {
  const el = document.getElementById('msg');
  el.className = 'msg '+type;
  el.textContent = text;
  el.style.display = 'block';
}
</script>
</body>
</html>
