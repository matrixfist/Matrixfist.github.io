<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Fist — Reset Password</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;font-family:'Helvetica Neue',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{max-width:420px;width:100%;background:#fff;border:2px solid #000;border-radius:12px;padding:40px 32px;text-align:center;}
.logo{font-size:26px;font-weight:900;letter-spacing:5px;color:#000;margin-bottom:6px;}
.logo-i{color:#FFC800;}
.tagline{font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.icon{font-size:48px;margin-bottom:16px;}
h1{font-size:24px;font-weight:900;color:#000;margin-bottom:12px;}
.msg{font-size:15px;color:#444;line-height:1.7;margin-bottom:20px;}
.input{width:100%;padding:14px;font-size:16px;border:2px solid #000;border-radius:8px;margin-bottom:14px;outline:none;font-family:inherit;}
.input:focus{border-color:#FFC800;}
.btn{display:block;width:100%;background:#000;color:#fff;font-size:16px;font-weight:800;padding:15px;border:none;border-radius:8px;cursor:pointer;letter-spacing:1px;margin-bottom:14px;font-family:inherit;}
.btn:hover{background:#333;}
.btn:disabled{background:#999;cursor:not-allowed;}
.err{color:#cc0000;font-size:14px;margin-bottom:14px;display:none;text-align:left;background:#FFF0F0;border:1px solid #cc0000;border-radius:8px;padding:10px;}
.note{font-size:12px;color:#888;margin-top:8px;line-height:1.6;}
.steps{text-align:left;background:#f5f5f5;border-radius:10px;padding:16px 20px;margin-bottom:16px;}
.steps ol{padding-left:20px;}
.steps li{font-size:13px;color:#444;line-height:2;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">MATR<span class="logo-i">I</span>X FIST</div>
  <div class="tagline">Anyone can play. Not everyone can win.</div>
  <div id="content">
    <div class="icon">⏳</div>
    <h1>Checking link...</h1>
    <p class="msg">Please wait.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://aneqybvksubgxbflwofb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuZXF5YnZrc3ViZ3hiZmx3b2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTM5MTA0NDcsImV4cCI6MjAyOTQ4NjQ0N30.qGe3DyknCCzRAT36lQBbwCDgvH1yJYdJsFfcVVvDzHI'
);

function validate(pw) {
  if (pw.length < 8) return 'Minimum 8 characters';
  if (pw.length > 16) return 'Maximum 16 characters';
  if (!/[A-Z]/.test(pw)) return 'Must include at least one capital letter';
  if (!/[^a-zA-Z0-9]/.test(pw)) return 'Must include at least one symbol (!@#$% etc.)';
  return null;
}

function showForm() {
  document.getElementById('content').innerHTML = `
    <div class="icon">🔑</div>
    <h1>Set New Password</h1>
    <p class="msg">Enter your new password below.</p>
    <input type="password" id="pw1" class="input" placeholder="New password (8-16 chars, 1 cap, 1 symbol)">
    <input type="password" id="pw2" class="input" placeholder="Confirm new password">
    <div id="err" class="err"></div>
    <button class="btn" id="submitBtn" onclick="doReset()">Set New Password</button>
    <p class="note">Return to the Matrix Fist app to sign in with your new password.</p>
  `;
}

function showExpired() {
  document.getElementById('content').innerHTML = `
    <div class="icon">⚠️</div>
    <h1>Request a New Link</h1>
    <p class="msg">This link has been used or expired. Please request a fresh one.</p>
    <div class="steps">
      <ol>
        <li>Open the <strong>Matrix Fist app</strong></li>
        <li>Tap <strong>Sign In → Forgot password?</strong></li>
        <li>Enter your email and tap Send</li>
        <li>Open the new email and tap the link <strong>immediately</strong></li>
      </ol>
    </div>
    <button class="btn" onclick="window.location.href='/'">Go to matrixfist.com</button>
    <p class="note">Need help? <a href="mailto:matrixfist.official@gmail.com" style="color:#000;font-weight:700;">matrixfist.official@gmail.com</a></p>
  `;
}

function showSuccess() {
  document.getElementById('content').innerHTML = `
    <div class="icon">✅</div>
    <h1>Password Updated!</h1>
    <p class="msg">Your password has been changed. Open the Matrix Fist app and sign in with your new password.</p>
    <button class="btn" onclick="window.location.href='/'">Go to matrixfist.com</button>
  `;
}

async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('submitBtn');
  err.style.display = 'none';

  const vErr = validate(pw1);
  if (vErr) { err.textContent = vErr; err.style.display = 'block'; return; }
  if (pw1 !== pw2) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }

  btn.textContent = 'Updating...';
  btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) {
    btn.textContent = 'Set New Password';
    btn.disabled = false;
    if (error.message.toLowerCase().includes('session') || error.message.toLowerCase().includes('token')) {
      showExpired();
    } else {
      err.textContent = error.message;
      err.style.display = 'block';
    }
    return;
  }
  await sb.auth.signOut();
  showSuccess();
}

// ── Parse URL on load ──────────────────────────────────────
window.addEventListener('load', async () => {
  const hash   = window.location.hash.substring(1);
  const search = window.location.search.substring(1);
  const params = new URLSearchParams(hash || search);

  // Case 1: Error in URL (e.g. otp_expired from Supabase)
  if (params.get('error')) {
    showExpired();
    return;
  }

  // Case 2: PKCE code in query string (?code=xxx)
  const code = new URLSearchParams(window.location.search).get('code');
  if (code) {
    const { error } = await sb.auth.exchangeCodeForSession(code);
    if (error) { showExpired(); return; }
    showForm();
    return;
  }

  // Case 3: Tokens in hash (#access_token=xxx&type=recovery)
  const accessToken  = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  const type         = params.get('type');

  if (accessToken && type === 'recovery') {
    // Validate it looks like a real JWT (three parts separated by dots)
    if (accessToken.split('.').length !== 3) {
      showExpired();
      return;
    }
    const { error } = await sb.auth.setSession({
      access_token:  accessToken,
      refresh_token: refreshToken || '',
    });
    if (error) { showExpired(); return; }
    showForm();
    return;
  }

  // Case 4: Already have a valid session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showForm();
    return;
  }

  // Nothing usable
  showExpired();
});
</script>
</body>
</html>
