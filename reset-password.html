<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Fist — Reset Password</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;font-family:'Helvetica Neue',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{max-width:420px;width:100%;background:#fff;border:2px solid #000;border-radius:12px;padding:40px 32px;text-align:center;}
.logo{font-size:26px;font-weight:900;letter-spacing:5px;color:#000;margin-bottom:6px;}
.logo-i{color:#FFC800;}
.tagline{font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.icon{font-size:48px;margin-bottom:20px;}
h1{font-size:24px;font-weight:900;color:#000;margin-bottom:12px;}
.msg{font-size:15px;color:#444;line-height:1.7;margin-bottom:20px;}
.error-box{background:#FFF0F0;border:1px solid #cc0000;border-radius:8px;padding:16px;margin-bottom:20px;text-align:left;}
.error-box h2{font-size:15px;color:#cc0000;margin-bottom:8px;}
.error-box p{font-size:13px;color:#8B0000;line-height:1.6;}
.error-box ol{font-size:13px;color:#8B0000;line-height:1.8;padding-left:20px;margin-top:8px;}
.input{width:100%;padding:14px;font-size:16px;border:2px solid #000;border-radius:8px;margin-bottom:14px;outline:none;}
.input:focus{border-color:#FFC800;}
.btn{display:block;width:100%;background:#000;color:#fff;font-size:16px;font-weight:800;padding:15px;border:none;border-radius:8px;cursor:pointer;letter-spacing:1px;margin-bottom:14px;}
.btn:hover{background:#333;}
.btn-outline{background:#fff;color:#000;border:2px solid #000;cursor:pointer;}
.note{font-size:12px;color:#888;margin-top:16px;}
.err{color:#cc0000;font-size:14px;margin-bottom:14px;display:none;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">MATR<span class="logo-i">I</span>X FIST</div>
  <div class="tagline">Anyone can play. Not everyone can win.</div>
  <div id="content">
    <div class="icon">⏳</div>
    <h1>Checking link...</h1>
    <p class="msg">Please wait while we verify your reset link.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://aneqybvksubgxbflwofb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuZXF5YnZrc3ViZ3hiZmx3b2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTM5MTA0NDcsImV4cCI6MjAyOTQ4NjQ0N30.qGe3DyknCCzRAT36lQBbwCDgvH1yJYdJsFfcVVvDzHI'
);

function validate(pw) {
  if (pw.length < 8) return 'Minimum 8 characters';
  if (pw.length > 16) return 'Maximum 16 characters';
  if (!/[A-Z]/.test(pw)) return 'Must include at least one capital letter';
  if (!/[^a-zA-Z0-9]/.test(pw)) return 'Must include at least one symbol (!@#$% etc.)';
  return null;
}

function showResetForm() {
  document.getElementById('content').innerHTML = `
    <div class="icon">🔑</div>
    <h1>Set New Password</h1>
    <p class="msg">Enter and confirm your new password below.</p>
    <input type="password" id="pw1" class="input" placeholder="New password (8-16 chars, 1 cap, 1 symbol)">
    <input type="password" id="pw2" class="input" placeholder="Confirm new password">
    <p id="err" class="err"></p>
    <button class="btn" onclick="resetPassword()">Set New Password</button>
    <p class="note">Return to the app to sign in with your new password.</p>
  `;
}

function showExpiredError() {
  document.getElementById('content').innerHTML = `
    <div class="icon">⚠️</div>
    <h1>Link Expired or Invalid</h1>
    <div class="error-box">
      <h2>What happened?</h2>
      <p>The password reset link has expired or was already used. Reset links are only valid for 1 hour and can only be used once.</p>
      <ol>
        <li>Open the <strong>Matrix Fist app</strong> on your phone</li>
        <li>Go to the sign in screen</li>
        <li>Tap <strong>"Forgot password?"</strong></li>
        <li>Enter your email to get a <strong>fresh link</strong></li>
        <li>Open that new email immediately and click the link</li>
        <li>You must open the link <strong>on the same device/browser</strong> where you requested it</li>
      </ol>
    </div>
    <button class="btn" onclick="window.location.href='/'">Go to matrixfist.com</button>
    <p class="note">Need help? <a href="mailto:matrixfist.official@gmail.com" style="color:#000;">matrixfist.official@gmail.com</a></p>
  `;
}

function showSuccess() {
  document.getElementById('content').innerHTML = `
    <div class="icon">✅</div>
    <h1>Password Updated!</h1>
    <p class="msg">Your password has been changed successfully. Open the Matrix Fist app and sign in with your new password.</p>
    <a href="/" class="btn" style="text-decoration:none;display:block;">Go to matrixfist.com</a>
  `;
}

async function resetPassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const err = document.getElementById('err');
  err.style.display = 'none';

  const vErr = validate(pw1);
  if (vErr) { err.textContent = vErr; err.style.display = 'block'; return; }
  if (pw1 !== pw2) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }

  const btn = document.querySelector('.btn');
  btn.textContent = 'Updating...';
  btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) {
    btn.textContent = 'Set New Password';
    btn.disabled = false;
    err.textContent = error.message;
    err.style.display = 'block';
    // If session is gone, show expired screen
    if (error.message.includes('Auth session missing') || error.message.includes('session')) {
      showExpiredError();
    }
    return;
  }
  showSuccess();
}

// ── On page load: parse the URL hash for the session tokens ──
// Supabase sends tokens in the URL hash: #access_token=...&type=recovery
window.addEventListener('load', async () => {
  const hash = window.location.hash;

  // Check for error in URL (expired/invalid link from Supabase redirect)
  if (hash.includes('error=')) {
    const params = new URLSearchParams(hash.replace('#', ''));
    const errorCode = params.get('error_code');
    const errorDesc = params.get('error_description');

    if (errorCode === 'otp_expired' || errorDesc?.includes('expired')) {
      showExpiredError();
      return;
    }
  }

  // Try to set session from hash tokens (PKCE flow)
  if (hash.includes('access_token=') || hash.includes('type=recovery')) {
    const params = new URLSearchParams(hash.replace('#', ''));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');

    if (type === 'recovery' && accessToken) {
      // Set the session using the tokens from the URL
      const { error } = await sb.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken || '',
      });

      if (error) {
        showExpiredError();
        return;
      }

      showResetForm();
      return;
    }
  }

  // Check if there's already an active session (user clicked link, session exists)
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showResetForm();
    return;
  }

  // No session, no tokens — link is missing or expired
  showExpiredError();
});
</script>
</body>
</html>
